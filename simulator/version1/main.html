<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Circuit Sandbox V1</title>

        <style>
            * {
                box-sizing: border-box;
            }

            body {
                margin: 0;
                font-family: Arial, sans-serif;
                background: #111;
                color: #eee;
                height: 100vh;
                overflow: hidden;
            }

            .app {
                display: grid;
                grid-template-columns: 260px 1fr 220px;
                height: 100vh;
            }

            .panel {
                background: #181818;
                padding: 14px;
                overflow: hidden;
            }

            .left {
                border: none;
                border-right: 1px solid #2a2a2a;
                overflow-y: auto;
            }

            .panel-heading {
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 10px;
            }

            .probe-toggle,
            .probe-close {
                background: #101010;
                border: 1px solid #333;
                color: #eee;
                border-radius: 4px;
                cursor: pointer;
            }

            .probe-toggle {
                padding: 6px 10px;
                margin-bottom: 12px;
            }

            .probe-close {
                width: 30px;
                height: 30px;
                font-size: 18px;
            }

            .probe-popout {
                position: fixed;
                left: 280px;
                bottom: 20px;
                z-index: 10;
                display: none;
                flex-direction: column;
                width: min(440px, calc(100vw - 300px));
                height: min(340px, calc(100vh - 40px));
                padding: 14px;
                background: #181818;
                border: 1px solid #444;
                border-radius: 6px;
                box-shadow: 0 8px 30px #000a;
            }

            .probe-popout.open {
                display: flex;
            }

            #probe-canvas {
                flex: 1;
                min-height: 0;
                height: auto;
                background: #000;
                border: 1px solid #333;
            }

            .right {
                border: none;
                border-left: 1px solid #2a2a2a;
                display: grid;
                grid-template-rows: 1fr 1fr;
                padding: 0;
            }

            .right-section {
                min-height: 0;
                overflow: hidden;
                padding: 14px;
            }

            .right-section:first-child {
                border-bottom: 1px solid #2a2a2a;
            }

            .right-section:last-child {
                overflow-y: auto;
            }

            h2,
            h3 {
                margin: 0 0 12px;
                font-weight: normal;
            }

            h2 {
                font-size: 18px;
            }

            h3 {
                font-size: 14px;
                color: #aaa;
                border-bottom: 1px solid #333;
                padding-bottom: 6px;
                margin-top: 18px;
            }

            label {
                display: block;
                font-size: 13px;
                color: #aaa;
                margin-bottom: 6px;
            }

            input,
            select {
                width: 100%;
                padding: 8px;
                background: #101010;
                border: 1px solid #333;
                color: #eee;
                border-radius: 4px;
                margin-bottom: 10px;
            }

            input[readonly] {
                color: #999;
            }

            .component-type {
                color: #ccc;
                font-size: 15px;
                margin-bottom: 16px;
            }

            .property-row {
                margin-bottom: 10px;
            }

            .empty-properties {
                color: #777;
                font-size: 13px;
                line-height: 1.4;
            }

            .canvas-wrap {
                background: #0d0d0d;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 0;
            }

            canvas {
                width: 100%;
                height: 100%;
            }

            .component-list {
                height: calc(100% - 30px);
                overflow-y: auto;
                padding-right: 4px;
            }

            .component-btn {
                width: 100%;
                background: #101010;
                border: 1px solid #333;
                color: #eee;
                padding: 9px;
                margin-bottom: 8px;
                text-align: left;
                border-radius: 4px;
                cursor: pointer;
            }

            .component-btn:hover {
                background: #222;
            }
        </style>
    </head>

    <body>
        <div class="app">
            <aside class="panel left">
                <section>
                    <div class="panel-heading">
                        <h2>Properties</h2>
                        <button id="probe-open" class="probe-toggle" type="button">
                            Probes
                        </button>
                    </div>
                    <div id="properties-panel">
                        <p class="empty-properties">
                            Select a component to view its properties.
                        </p>
                    </div>
                </section>
            </aside>

            <main class="canvas-wrap">
                <canvas id="circuit-canvas"></canvas>
            </main>

            <aside class="panel right">
                <section class="right-section">
                    <h2>Components</h2>

                    <div class="component-list" id="components-panel">
                        <button class="component-btn">Wire</button>
                        <button class="component-btn">Resistor</button>
                        <button class="component-btn">Capacitor</button>
                        <button class="component-btn">Universal Inductor</button>
                        <button class="component-btn">Diode</button>
                        <button class="component-btn">MOSFET</button>
                        <button class="component-btn">Voltage Source</button>
                        <button class="component-btn">Current Source</button>
                        <button class="component-btn">Signal Generator</button>
                        <button class="component-btn">Fixed Voltage / Ground</button>
                        <button class="component-btn">Reader</button>
                    </div>
                </section>

                <section class="right-section">
                    <h2>Controls</h2>

                    <label for="layer-from">View from layer</label>
                    <input id="layer-from" type="number" value="0" />

                    <label for="layer-to">View to layer</label>
                    <input id="layer-to" type="number" value="100" />

                    <label for="simulation-time">Time (seconds)</label>
                    <input id="simulation-time" type="number" min="0" step="any" value="0" />

                    <label for="time-step">Time per step (dt)</label>
                    <input id="time-step" type="number" min="0" step="any" value="0.02" />

                    <label for="steps-per-second">Time steps per second</label>
                    <input id="steps-per-second" type="number" min="1" step="1" value="50" />

                    <button id="simulation-toggle" class="component-btn" type="button">
                        Pause
                    </button>
                </section>
            </aside>
        </div>

        <section id="probe-popout" class="probe-popout" aria-hidden="true">
            <div class="panel-heading">
                <h2>Probes</h2>
                <button id="probe-close" class="probe-close" type="button" aria-label="Close probes">
                    &times;
                </button>
            </div>

            <label for="probe-history">Time Steps History</label>
            <input id="probe-history" type="number" min="1" step="1" value="100" />

            <canvas id="probe-canvas"></canvas>
        </section>

        <script type="module" src="handler.js"></script>
    </body>
</html>
